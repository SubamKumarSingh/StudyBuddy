databases:
  - name: studybuddy-db
    databaseName: studybuddy
    user: studybuddy

services:
  - type: web
    name: studybuddy-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate && gunicorn studybuddy.wsgi:application --bind 0.0.0.0:$PORT
    plan: free
    healthCheckPath: /health/
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: studybuddy-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: localhost,127.0.0.1
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
